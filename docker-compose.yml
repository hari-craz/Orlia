services:
  web:
    build: .
    ports:
      - "${APP_PORT:-10012}:80"
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-orlia}
      DB_USER: ${DB_USER:-orlia}
      DB_PASSWORD: ${DB_PASSWORD:-orlia}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-orlia_root}
    volumes:
      - uploads:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:10.11
    environment:
      MYSQL_DATABASE: ${DB_NAME:-orlia}
      MYSQL_USER: ${DB_USER:-orlia}
      MYSQL_PASSWORD: ${DB_PASSWORD:-orlia}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-orlia_root}
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - db_data:/var/lib/mysql
      - ./assets/Schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "${PMA_PORT:-10013}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-orlia_root}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  uploads:

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orlia-web
    ports:
      - "8095:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=orlia
    networks:
      - orlia-network
    restart: unless-stopped

  db:
    image: mariadb:10.6
    container_name: orlia-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: orlia
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    volumes:
      - orlia-db-data:/var/lib/mysql
    networks:
      - orlia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  db-init:
    image: mariadb:10.6
    container_name: orlia-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_PWD: rootpassword
    volumes:
      - ./init.sql:/init.sql
    networks:
      - orlia-network
    command: mysql -h db -u root orlia < /init.sql
    restart: "no"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: orlia-phpmyadmin
    ports:
      - "8096:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - db
    networks:
      - orlia-network
    restart: unless-stopped

networks:
  orlia-network:
    driver: bridge

volumes:
  orlia-db-data:
